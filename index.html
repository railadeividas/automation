<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💖 Meilės magija — įvesk vardus!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Dancing+Script:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0015 0%, #1a0025 30%, #2d0015 60%, #0a0015 100%);
      font-family: 'Playfair Display', serif;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── žvaigždėtas dangus ── */
    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── pagrindinis card ── */
    .card {
      position: relative;
      z-index: 10;
      width: 92%;
      max-width: 520px;
      background: rgba(20, 5, 35, 0.65);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 150, 200, 0.25);
      border-radius: 32px;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow:
        0 0 80px rgba(255, 80, 150, 0.15),
        0 0 160px rgba(180, 50, 255, 0.08),
        inset 0 0 60px rgba(255, 100, 180, 0.04);
      animation: card-float 6s ease-in-out infinite;
    }
    @keyframes card-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .heart-icon-big {
      font-size: 3rem;
      display: inline-block;
      animation: heartbeat 1.4s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255, 50, 100, 0.6));
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.25); }
      28% { transform: scale(1); }
      42% { transform: scale(1.2); }
      56% { transform: scale(1); }
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 2.6rem;
      background: linear-gradient(135deg, #ff6b9d, #ff4d6d, #c77dff, #ff6b9d);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-shift 4s ease infinite;
      margin: 0.5rem 0 0.25rem;
      line-height: 1.2;
    }
    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .subtitle {
      color: rgba(255, 200, 230, 0.7);
      font-size: 1rem;
      letter-spacing: 2px;
      margin-bottom: 1.8rem;
      font-family: 'Playfair Display', serif;
    }

    /* ── input fields ── */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper .label-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      pointer-events: none;
      opacity: 0.8;
    }
    .input-wrapper input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 3rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1.5px solid rgba(255, 150, 200, 0.2);
      border-radius: 16px;
      color: #f0e6f0;
      font-size: 1.1rem;
      font-family: 'Playfair Display', serif;
      outline: none;
      transition: all 0.3s;
    }
    .input-wrapper input::placeholder {
      color: rgba(255, 200, 230, 0.35);
      font-style: italic;
    }
    .input-wrapper input:focus {
      border-color: #ff6b9d;
      box-shadow: 0 0 24px rgba(255, 80, 150, 0.2);
      background: rgba(255, 255, 255, 0.08);
    }

    /* ── magic button ── */
    .magic-btn {
      position: relative;
      width: 100%;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #ff4d6d, #c77dff);
      border: none;
      border-radius: 60px;
      color: #fff;
      font-size: 1.2rem;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s;
      box-shadow: 0 4px 30px rgba(255, 50, 100, 0.4);
      letter-spacing: 1px;
    }
    .magic-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 40px rgba(255, 50, 100, 0.55);
    }
    .magic-btn:active { transform: scale(0.97); }
    .magic-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    .magic-btn::after {
      content: '';
      position: absolute;
      inset: -50%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: translateX(-100%) rotate(25deg);
      transition: 0.6s;
    }
    .magic-btn:hover::after { transform: translateX(100%) rotate(25deg); }

    .btn-sparkle {
      display: inline-block;
      animation: btn-spin 3s linear infinite;
    }
    @keyframes btn-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ── result area ── */
    .result {
      display: none;
      margin-top: 1.8rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 150, 200, 0.15);
      animation: result-appear 0.8s ease-out;
    }
    .result.show {
      display: block;
    }
    @keyframes result-appear {
      0% { opacity: 0; transform: scale(0.9) translateY(15px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .compatibility-ring {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 1rem;
    }
    .compatibility-ring svg {
      transform: rotate(-90deg);
    }
    .compatibility-ring .bg-circle {
      fill: none;
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 6;
    }
    .compatibility-ring .progress-circle {
      fill: none;
      stroke: url(#loveGrad);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 377;
      stroke-dashoffset: 377;
      transition: stroke-dashoffset 2s ease-out;
    }
    .compatibility-ring .percent-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ff6b9d, #c77dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: 'Playfair Display', serif;
    }

    .love-message {
      font-family: 'Dancing Script', cursive;
      font-size: 1.6rem;
      color: #f0d6f0;
      margin: 0.5rem 0 0.3rem;
      line-height: 1.5;
      min-height: 2.4rem;
    }
    .love-poem {
      font-size: 0.95rem;
      color: rgba(255, 200, 230, 0.75);
      font-style: italic;
      line-height: 1.7;
      margin: 0.5rem 0;
      padding: 0 0.5rem;
      max-height: 120px;
      overflow-y: auto;
    }
    .love-poem::-webkit-scrollbar { width: 3px; }
    .love-poem::-webkit-scrollbar-track { background: transparent; }
    .love-poem::-webkit-scrollbar-thumb { background: rgba(255,150,200,0.3); border-radius: 3px; }

    .reactions {
      margin-top: 0.8rem;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      font-size: 1.6rem;
      flex-wrap: wrap;
    }
    .reactions span {
      display: inline-block;
      animation: pop-in 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55) both;
    }
    @keyframes pop-in {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    .reset-btn {
      background: none;
      border: 1px solid rgba(255, 150, 200, 0.2);
      color: rgba(255, 200, 230, 0.5);
      padding: 0.4rem 1.2rem;
      border-radius: 30px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.8rem;
      font-family: 'Playfair Display', serif;
    }
    .reset-btn:hover {
      border-color: rgba(255, 150, 200, 0.5);
      color: rgba(255, 200, 230, 0.9);
    }

    /* ── floating hearts ── */
    .floating-hearts {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .heart-particle {
      position: absolute;
      bottom: -40px;
      font-size: 1.2rem;
      animation: float-up linear infinite;
      opacity: 0.4;
    }
    @keyframes float-up {
      0% { transform: translateY(0) rotate(0deg) scale(0.6); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-110vh) rotate(720deg) scale(1.2); opacity: 0; }
    }

    /* ── burst hearts on magic ── */
    .burst-container {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
    }
    .burst-particle {
      position: absolute;
      font-size: 1.5rem;
      animation: burst-fly 1.8s ease-out forwards;
    }
    @keyframes burst-fly {
      0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 1; }
      50% { opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1) rotate(720deg); opacity: 0; }
    }

    /* ── stars particles ── */
    .star-particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.8; transform: scale(1.3); }
    }

    /* ── footer ── */
    .footer {
      margin-top: 1.2rem;
      font-size: 0.75rem;
      color: rgba(255, 200, 230, 0.2);
      letter-spacing: 1px;
    }

    /* ── responsive ── */
    @media (max-width: 480px) {
      .card { padding: 1.8rem 1.2rem; border-radius: 24px; }
      h1 { font-size: 2rem; }
      .compatibility-ring { width: 110px; height: 110px; }
      .compatibility-ring .percent-text { font-size: 1.7rem; }
      .love-message { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <!-- stars -->
  <canvas id="stars-canvas"></canvas>

  <!-- floating hearts -->
  <div class="floating-hearts" id="floatingHearts"></div>

  <!-- burst container -->
  <div class="burst-container" id="burstContainer"></div>

  <!-- main card -->
  <div class="card">
    <div class="heart-icon-big">💖</div>
    <h1>Meilės magija</h1>
    <p class="subtitle">įvesk vardus ir pamatyk stebuklą ✨</p>

    <div class="input-group">
      <div class="input-wrapper">
        <span class="label-icon">👤</span>
        <input type="text" id="name1" placeholder="Tavo vardas..." maxlength="30" autocomplete="off">
      </div>
      <div class="input-wrapper">
        <span class="label-icon">💕</span>
        <input type="text" id="name2" placeholder="Antros pusės vardas..." maxlength="30" autocomplete="off">
      </div>
    </div>

    <button class="magic-btn" id="magicBtn" onclick="revealMagic()">
      <span class="btn-sparkle">✨</span> Atskleisti magiją <span class="btn-sparkle">✨</span>
    </button>

    <div class="result" id="result">
      <div class="compatibility-ring">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <defs>
            <linearGradient id="loveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ff4d6d"/>
              <stop offset="100%" stop-color="#c77dff"/>
            </linearGradient>
          </defs>
          <circle class="bg-circle" cx="70" cy="70" r="60"/>
          <circle class="progress-circle" id="progressCircle" cx="70" cy="70" r="60"/>
        </svg>
        <div class="percent-text" id="percentText">0%</div>
      </div>

      <div class="love-message" id="loveMessage"></div>
      <div class="love-poem" id="lovePoem"></div>
      <div class="reactions" id="reactions"></div>
      <button class="reset-btn" onclick="resetAll()">⟳ Iš naujo</button>
    </div>

    <div class="footer">with ✨ magic &nbsp;·&nbsp; ❤️</div>
  </div>

  <script>
    // ════════════════════════════════════════════
    //  STAR FIELD
    // ════════════════════════════════════════════
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function initStars(count = 160) {
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.8 + 0.5,
          alpha: Math.random() * 0.8 + 0.2,
          speed: Math.random() * 0.02 + 0.005,
          phase: Math.random() * Math.PI * 2,
        });
      }
    }
    initStars();

    function drawStars(time) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        const flicker = 0.5 + 0.5 * Math.sin(time * s.speed + s.phase);
        const a = s.alpha * flicker;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 220, 255, ${a})`;
        ctx.fill();
        // glow
        if (s.r > 1.2) {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 200, 240, ${a * 0.12})`;
          ctx.fill();
        }
      }
      requestAnimationFrame(drawStars);
    }
    drawStars(0);

    // Resize handler re-init
    window.addEventListener('resize', () => {
      resizeCanvas();
      initStars();
    });

    // ════════════════════════════════════════════
    //  FLOATING HEARTS
    // ════════════════════════════════════════════
    function createFloatingHearts() {
      const container = document.getElementById('floatingHearts');
      const emojis = ['💖', '💗', '💕', '❤️', '✨', '🌸', '🦋'];
      for (let i = 0; i < 18; i++) {
        const el = document.createElement('div');
        el.className = 'heart-particle';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.fontSize = (0.8 + Math.random() * 1.4) + 'rem';
        el.style.animationDuration = (12 + Math.random() * 20) + 's';
        el.style.animationDelay = (Math.random() * 20) + 's';
        el.style.opacity = 0.2 + Math.random() * 0.3;
        container.appendChild(el);
      }
    }
    createFloatingHearts();

    // ════════════════════════════════════════════
    //  BURST
    // ════════════════════════════════════════════
    function createBurst(originX, originY) {
      const container = document.getElementById('burstContainer');
      const emojis = ['💖', '💗', '❤️', '💕', '✨', '🌟', '💫', '🌸', '🦋', '💝', '🌺', '🎀'];
      for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.className = 'burst-particle';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];

        const angle = Math.random() * Math.PI * 2;
        const dist = 120 + Math.random() * 280;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist - 100;

        el.style.left = originX + 'px';
        el.style.top = originY + 'px';
        el.style.setProperty('--tx', tx + 'px');
        el.style.setProperty('--ty', ty + 'px');
        el.style.fontSize = (0.8 + Math.random() * 1.6) + 'rem';
        el.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
        el.style.animationDelay = (Math.random() * 0.2) + 's';

        container.appendChild(el);

        // cleanup after animation
        setTimeout(() => el.remove(), 2500);
      }
    }

    // ════════════════════════════════════════════
    //  MAGIC ENGINE
    // ════════════════════════════════════════════
    const poems = [
      'Tavo akyse — visas pasaulis,\nširdyje — tik tu ir aš.',
      'Kaip žvaigždės danguje,\ntaip mūsų širdys susilieja.',
      'Vėjas šnabžda tavo vardą,\nnes visa visata žino — mes kartu.',
      'Kai tavo ranka manojoj,\nlaikas sustoja ir prabyla amžinybė.',
      'Tavo šypsena — kaip saulė,\nnet tamsiausią naktį paverčia šviesa.',
      'Du vardai, viena širdis,\nvisatos stebuklas — mūsų meilė.',
      'Ne ieškojau — radau.\nNe tikėjausi — patikėjau.\nTai tu.',
      'Mūsų meilė — kaip rasa ryte,\ntrapi, tyra ir tikra.',
      'Tu esi mano geriausias\n„atsitiktinumas“ gyvenime.',
    ];

    const messages = [
      'Jūsų širdys plaka kartu! 💓',
      'Visata šypsosi jums! ✨',
      'Tai — likimas! 🌟',
      'Meilė sužydėjo! 🌸',
      'Stebuklas įvyko! 🌈',
      'Jūs sukurti vienas kitam! 💞',
      'Amžina meilė čia ir dabar! 💝',
      'Jūsų sielos — viena! 🌌',
    ];

    const reactionSets = [
      ['💖', '💗', '❤️', '💕', '✨', '🌟'],
      ['🌸', '🦋', '🌺', '💖', '✨', '🌙'],
      ['🌹', '💝', '💞', '💫', '🌸', '🕊️'],
      ['💓', '💗', '💖', '💕', '✨', '🌺'],
    ];

    function nameBasedValue(name1, name2) {
      // deterministic pseudo-random from names
      const combined = (name1 + name2).toLowerCase().trim();
      let hash = 0;
      for (let i = 0; i < combined.length; i++) {
        const ch = combined.charCodeAt(i);
        hash = ((hash << 5) - hash) + ch;
        hash |= 0;
      }
      // 70-100 range with deterministic variation
      return 70 + (Math.abs(hash) % 31);
    }

    function pick(arr, seed) {
      const idx = Math.abs(seed) % arr.length;
      return arr[idx];
    }

    function capitalize(s) {
      if (!s) return s;
      return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
    }

    function revealMagic() {
      const name1 = document.getElementById('name1').value.trim();
      const name2 = document.getElementById('name2').value.trim();
      const btn = document.getElementById('magicBtn');

      if (!name1 || !name2) {
        btn.style.transform = 'scale(0.95)';
        setTimeout(() => btn.style.transform = '', 300);
        return;
      }

      btn.disabled = true;
      btn.textContent = '✨ Stebuklas kuriamas... ✨';

      const vardai = [capitalize(name1), capitalize(name2)];
      const seed = nameBasedValue(vardai[0], vardai[1]);
      const percent = nameBasedValue(vardai[0], vardai[1]);

      // burst from center of button
      const rect = btn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      createBurst(cx, cy);

      // show result after short delay
      setTimeout(() => {
        const result = document.getElementById('result');
        result.classList.add('show');

        // Animate percentage
        const progressCircle = document.getElementById('progressCircle');
        const percentText = document.getElementById('percentText');
        const circumference = 377; // 2 * pi * 60
        const targetOffset = circumference - (percent / 100) * circumference;
        progressCircle.style.strokeDashoffset = targetOffset;

        // Count up
        let current = 0;
        const interval = setInterval(() => {
          current += 1;
          percentText.textContent = Math.min(current, percent) + '%';
          if (current >= percent) clearInterval(interval);
        }, 20);

        // Love message
        const msg = pick(messages, seed + 1);
        document.getElementById('loveMessage').textContent = msg;

        // Personalized poem
        const poem = pick(poems, seed + 2);
        document.getElementById('lovePoem').textContent = poem;

        // Reactions with delay
        const reactionsContainer = document.getElementById('reactions');
        reactionsContainer.innerHTML = '';
        const reactSet = pick(reactionSets, seed + 3);
        reactSet.forEach((emoji, i) => {
          const span = document.createElement('span');
          span.textContent = emoji;
          span.style.animationDelay = (i * 0.12) + 's';
          reactionsContainer.appendChild(span);
        });

        btn.textContent = '✨ Magija nutiko! ✨';
        btn.disabled = false;

        // second burst
        setTimeout(() => createBurst(cx, cy), 500);

      }, 600);
    }

    function resetAll() {
      document.getElementById('name1').value = '';
      document.getElementById('name2').value = '';
      document.getElementById('result').classList.remove('show');
      document.getElementById('progressCircle').style.strokeDashoffset = 377;
      document.getElementById('percentText').textContent = '0%';
      document.getElementById('loveMessage').textContent = '';
      document.getElementById('lovePoem').textContent = '';
      document.getElementById('reactions').innerHTML = '';
      document.getElementById('magicBtn').textContent = '✨ Atskleisti magiją ✨';
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const active = document.activeElement;
        if (active && (active.id === 'name1' || active.id === 'name2')) {
          revealMagic();
        }
      }
    });
  </script>
</body>
</html>
